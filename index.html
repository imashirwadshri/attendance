<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEU Attendance Tracker</title>

<style>
*{box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  margin:0;
  background:#000;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

.container{
  position:relative;
  z-index:2;
  width:92%;
  max-width:520px;
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:25px 20px;
  border:1px solid rgba(255,215,0,.4);
  box-shadow:0 0 25px rgba(255,215,0,.25);
}

h1{
  text-align:center;
  color:#ffd700;
  margin-bottom:8px;
}

#top{
  text-align:center;
  margin-bottom:8px;
  font-size:14px;
  font-weight:bold;
  color:#ccc;
}

.sub{
  text-align:center;
  color:#ffd700;
  margin-bottom:15px;
}

label{display:block;margin-top:14px;margin-bottom:4px}

input,select{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #ffd700;
  background:#000;
  color:#fff;
  margin-bottom:10px;
}

select:disabled{
  opacity:0.4;
  cursor:not-allowed;
}

button{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:12px;
  background:#ffd700;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

.result{
  margin-top:20px;
  border-top:1px solid #444;
  padding-top:12px;
}

.red{color:red;font-weight:bold}
#msg{margin-top:5px;color:#00ff99;font-size:13px}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

<h1>BEU ATTENDANCE TRACKER</h1>
<div id="top"></div>
<div class="sub">Design by Bihari </div>

<div id="setup"></div>
<div id="main" style="display:none"></div>

<div class="result">
<b>Attendance Information</b>
<div id="result"></div>
</div>

<!-- ✅ ONLY RESET BUTTON -->
<button onclick="resetData()">Reset Month</button>

</div>

<script>

// LIVE TIME
function updateTime(){
  let d = new Date();

  let day = d.toLocaleDateString('en-US',{weekday:'long'});
  let date = String(d.getDate()).padStart(2,'0') + "/" +
             String(d.getMonth()+1).padStart(2,'0') + "/" +
             d.getFullYear();

  let h = d.getHours();
  let m = d.getMinutes();
  let s = d.getSeconds();

  let ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;

  let time =
    String(h).padStart(2,'0') + ":" +
    String(m).padStart(2,'0') + ":" +
    String(s).padStart(2,'0') + " " + ampm;

  document.getElementById("top").innerHTML =
    `<span style="color:#ffd700">${day}</span> | ${date} | ${time}`;
}

// STORAGE
function get(){return JSON.parse(localStorage.getItem('beu'))||null}
function set(d){localStorage.setItem('beu',JSON.stringify(d))}

// INIT
function init(){
 updateTime();
 setInterval(updateTime,1000);

 if(!get()) setup1(); else loadMain();
}

// SETUP
function setup1(){
 setup.innerHTML=`
 <label>Total Subjects</label>
 <input id='count' type='number' max='8'>

 <label>Working Days</label>
 <input id='days' type='number' max='25'>

 <button onclick='setup2()'>Next</button>`;
}

function setup2(){
 let c=+count.value;
 let d=+days.value;

 if(!c||!d)return alert('Fill all');
 if(c>8)return alert('Max 8 subjects');
 if(d>25)return alert('Max 25 days');

 let html='';
 for(let i=0;i<c;i++){
   html+=`<label>Subject ${i+1}</label><input id='s${i}'>`;
 }

 html+=`<button onclick='saveSetup(${c},${d})'>Start</button>`;
 setup.innerHTML=html;
}

function isValidName(name){
 return /^[A-Za-z ]+$/.test(name);
}

function saveSetup(c,d){
 let subs=[];
 for(let i=0;i<c;i++){
   let val=document.getElementById('s'+i).value;
   if(!isValidName(val)) return alert('Only text allowed');
   subs.push(val);
 }

 set({
  subjects:subs,
  workingDays:d,
  totalDays:0,
  presentDays:0,
  subjectData:subs.map(()=>({t:0,p:0})),
  saved:{}
 });

 loadMain();
}

// MAIN
function loadMain(){
 let data=get();
 setup.style.display='none';
 main.style.display='block';

 let html=`<label>Biometric</label>
 <select id='bio' onchange='handleBiometric()'>
  <option value=''>Select</option>
  <option value=1>Present</option>
  <option value=0>Absent</option>
 </select>`;

 html+=`<b>Select Any 3 Subjects</b><div id="msg"></div>`;

 data.subjects.forEach((s,i)=>{
   html+=`<label>${s}</label>
   <select id='sub${i}' onchange='limitSubjects()'>
    <option value=''>--</option>
    <option value=1>Present</option>
    <option value=0>Absent</option>
   </select>`;
 });

 html+=`<button onclick='save()'>Save Today</button>`;
 main.innerHTML=html;

 show();
}

// BIOMETRIC
function handleBiometric(){
 let bio=document.getElementById("bio").value;

 document.querySelectorAll("[id^='sub']").forEach(s=>{
   let present=s.querySelector("option[value='1']");
   present.disabled = (bio=="0");
 });
}

// LIMIT
function limitSubjects(){
 let count=0;
 document.querySelectorAll("[id^='sub']").forEach(s=>{
  if(s.value!=='') count++;
 });

 document.querySelectorAll("[id^='sub']").forEach(s=>{
  if(count>=3 && s.value==='') s.disabled=true;
  else s.disabled=false;
 });

 msg.innerText = count===3 ? "✔ 3 Subjects Selected" : "";
}

// SAVE
function save(){
 let d=get();
 let t = new Date().toDateString();

 if(d.saved[t]) return alert('Already saved today');

 let bioVal=document.getElementById('bio').value;
 if(bioVal==='') return alert('Select biometric');

 let bio=+bioVal;
 d.totalDays++;
 if(bio)d.presentDays++;

 let count=0;
 let entry={bio};

 d.subjects.forEach((_,i)=>{
   let v=document.getElementById('sub'+i).value;

   if(v!==''){
     count++;

     if(bio===0) v=0;
     else v=+v;

     d.subjectData[i].t++;
     if(v===1)d.subjectData[i].p++;

     entry['s'+i]=v;
   }
 });

 if(count!==3)return alert('Select exactly 3 subjects');

 d.saved[t]=entry;
 set(d);
 location.reload();
}

// CALC
function per(p,t){return t?((p/t)*100):0}
function need75(p,t){return Math.max(0,Math.ceil(0.75*t)-p)}

// SHOW
function show(){
 let d=get(); if(!d)return;

 let html="";

 let p=d.presentDays;
 let t=d.totalDays;
 let perVal=per(p,t);

 let warn=(t>0 && perVal<75)?"red":"";

 html+=`<div class='${warn}'>
 <b>Biometric</b><br>
 Total: ${t} | Present: ${p} | Absent: ${t-p}<br>
 ${perVal.toFixed(1)}% | Need: ${need75(p,t)}
 </div><br>`;

 d.subjects.forEach((s,i)=>{
  let p=d.subjectData[i].p;
  let t=d.subjectData[i].t;
  let perVal=per(p,t);

  let warn=(t>0 && perVal<75)?"red":"";

  html+=`<div class='${warn}'>
  <b>${s}</b><br>
  Total: ${t} | Present: ${p} | Absent: ${t-p}<br>
  ${perVal.toFixed(1)}% | Need: ${need75(p,t)}
  </div><br>`;
 });

 result.innerHTML=html;
}

// RESET
function resetData(){
 if(!confirm("Reset all data?")) return;
 localStorage.removeItem("beu");
 location.reload();
}

// BACKGROUND
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

function resize(){
 canvas.width=window.innerWidth;
 canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let pts=[];
for(let i=0;i<60;i++){
 pts.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5),vy:(Math.random()-0.5)});
}

function animate(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 pts.forEach(p=>{
  p.x+=p.vx;
  p.y+=p.vy;

  if(p.x<0||p.x>canvas.width)p.vx*=-1;
  if(p.y<0||p.y>canvas.height)p.vy*=-1;

  ctx.fillStyle="#ffd700";
  ctx.fillRect(p.x,p.y,2,2);
 });

 for(let i=0;i<pts.length;i++){
  for(let j=i+1;j<pts.length;j++){
   let dx=pts[i].x-pts[j].x;
   let dy=pts[i].y-pts[j].y;
   let dist=Math.sqrt(dx*dx+dy*dy);

   if(dist<100){
    ctx.strokeStyle="rgba(255,215,0,0.2)";
    ctx.beginPath();
    ctx.moveTo(pts[i].x,pts[i].y);
    ctx.lineTo(pts[j].x,pts[j].y);
    ctx.stroke();
   }
  }
 }

 requestAnimationFrame(animate);
}

animate();

init();
</script>

</body>
</html>
